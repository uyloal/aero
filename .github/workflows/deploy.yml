name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Inject local proxies config
        env:
          PROXIES_TS: ${{ secrets.PROXIES_TS }}
        run: |
          if [ -n "$PROXIES_TS" ]; then
            printenv PROXIES_TS > src/config/proxies.ts
          fi

      - name: Build
        env:
          GITHUB_REPO_SLUG: ${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: bun run build

      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release
          publish_dir: ./output
          force_orphan: true
          commit_message: 'ci: deploy rule providers and clash config'

      - name: Generate release tag
        id: tag
        run: echo "tag=v$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Read release notes
        id: notes
        run: |
          body=$(cat output/RELEASE_NOTES.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete old releases and tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo ${{ github.repository }} -L 100 --json tagName -q '.[].tagName' | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" --repo ${{ github.repository }} --yes || true
            fi
          done

          gh api "repos/${{ github.repository }}/git/refs/tags" --paginate -q '.[].ref' 2>/dev/null | sed 's|refs/tags/||' | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "Deleting tag: $tag"
              gh api --method DELETE "repos/${{ github.repository }}/git/refs/tags/$tag" || true
            fi
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          target_commitish: release